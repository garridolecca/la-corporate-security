<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA County Corporate Security Dashboard</title>

  <!-- Preload data immediately — downloads in parallel with ArcGIS SDK -->
  <script>window._dp = fetch("data.bin").then(r => r.arrayBuffer());</script>

  <!-- ArcGIS 4.31 AMD (lighter initial load than 5.0 ES modules) -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
  <script src="https://js.arcgis.com/4.31/"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #6c8cff;
      --bg-deep: #070b14;
      --bg-glass: rgba(10, 14, 28, 0.82);
      --text-1: #edf0f7;
      --text-2: #8b9ab8;
      --text-3: #3e4a64;
      --border: rgba(255,255,255,0.06);
      --radius: 12px;
    }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--bg-deep); color: var(--text-1);
      font-family: "Avenir Next", "Inter", system-ui, sans-serif;
    }

    #viewDiv { position: absolute; inset: 0; z-index: 1; }
    #lensCanvas { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
    #interactionLayer { position: absolute; inset: 0; z-index: 15; cursor: none; }

    .glass {
      position: absolute; z-index: 20;
      background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius); border: 1px solid var(--border);
      padding: 6px; display: flex; gap: 3px;
    }
    .glass.col { flex-direction: column; }

    .g-btn {
      padding: 7px 14px; border: 1px solid transparent; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--text-2); transition: all 0.2s;
      display: flex; align-items: center; gap: 7px; white-space: nowrap; font-family: inherit;
    }
    .g-btn:hover { color: var(--text-1); background: rgba(255,255,255,0.04); }
    .g-btn.on {
      color: #fff; background: rgba(108,140,255,0.16);
      border-color: rgba(108,140,255,0.25); box-shadow: 0 0 12px rgba(108,140,255,0.10);
    }

    .g-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }

    .g-label {
      font-size: 9px; color: var(--text-3); text-transform: uppercase;
      letter-spacing: 1.4px; text-align: center; padding: 2px 8px 4px;
    }

    .cat-bar { bottom: 24px; left: 50%; transform: translateX(-50%); }
    .src-bar { top: 16px; right: 16px; flex-wrap: wrap; max-width: 600px; }
    .rad-bar { left: 16px; top: 50%; transform: translateY(-50%); }
    .rad-bar .g-btn { padding: 5px 12px; font-size: 11px; justify-content: center; }

    .legend {
      bottom: 24px; right: 16px; flex-direction: column;
      padding: 10px 14px; gap: 8px; pointer-events: none;
    }
    .leg-title { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.2px; }
    .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .leg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .leg-label { font-size: 9px; color: var(--text-3); }
    .leg-note { font-size: 9px; color: var(--text-3); margin-top: 1px; }

    .lens-tt {
      position: absolute; z-index: 25; pointer-events: none;
      opacity: 0; transition: opacity 0.15s; text-align: center;
    }
    .lens-tt.vis { opacity: 1; }
    .lens-num { font-size: 42px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -1.5px; text-shadow: 0 2px 24px rgba(0,0,0,0.6); }
    .lens-sub { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
    .lens-mi { font-size: 9px; color: var(--text-3); margin-top: 1px; }

    .title-grad {
      position: absolute; top: 0; left: 0; right: 0; z-index: 18;
      padding: 20px 24px;
      background: linear-gradient(180deg, rgba(7,11,20,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    .title-grad h1 { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .title-grad .sub { font-size: 12px; color: var(--text-2); margin-top: 3px; font-weight: 500; }

    .instr {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 20; font-size: 12px; color: var(--text-3); letter-spacing: 0.5px;
      pointer-events: none; transition: opacity 1s;
    }
    .instr.off { opacity: 0; }

    .load-screen {
      position: fixed; inset: 0; background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s;
    }
    .load-screen.off { opacity: 0; pointer-events: none; }
    .load-text { color: var(--text-2); font-size: 14px; font-weight: 500; }

    .esri-ui { display: none !important; }
  </style>
</head>
<body>

  <div class="load-screen" id="loader">
    <div class="load-text" id="loadMsg">Loading map...</div>
  </div>

  <div id="viewDiv"></div>
  <canvas id="lensCanvas"></canvas>
  <div id="interactionLayer"></div>

  <div class="title-grad">
    <h1>LA County Corporate Security</h1>
    <div class="sub">343,000 incidents from 7 intelligence sources &middot; Aug 2023 &ndash; Feb 2025</div>
  </div>

  <div class="glass src-bar" id="srcBar">
    <button class="g-btn on" data-v="-1">All Sources</button>
    <button class="g-btn" data-v="0"><div class="g-dot" style="color:#fff;background:#fff"></div>Samdesk</button>
    <button class="g-btn" data-v="1"><div class="g-dot" style="color:#38bdf8;background:#38bdf8"></div>Dataminr</button>
    <button class="g-btn" data-v="2"><div class="g-dot" style="color:#fb923c;background:#fb923c"></div>DataCapable</button>
    <button class="g-btn" data-v="3"><div class="g-dot" style="color:#4ade80;background:#4ade80"></div>IRWIN</button>
    <button class="g-btn" data-v="4"><div class="g-dot" style="color:#c084fc;background:#c084fc"></div>Geospark</button>
    <button class="g-btn" data-v="5"><div class="g-dot" style="color:#facc15;background:#facc15"></div>Seerist</button>
    <button class="g-btn" data-v="6"><div class="g-dot" style="color:#f472b6;background:#f472b6"></div>Factal</button>
  </div>

  <div class="glass col rad-bar" id="radBar">
    <div class="g-label">Radius</div>
    <button class="g-btn" data-v="1">1 mi</button>
    <button class="g-btn on" data-v="2">2 mi</button>
    <button class="g-btn" data-v="3">3 mi</button>
    <button class="g-btn" data-v="5">5 mi</button>
    <button class="g-btn" data-v="10">10 mi</button>
  </div>

  <div class="glass cat-bar" id="catBar">
    <button class="g-btn on" data-v="-1"><div class="g-dot" style="background:#fff"></div>All</button>
    <button class="g-btn" data-v="0"><div class="g-dot" style="color:#ef4444;background:#ef4444"></div>Armed Violence</button>
    <button class="g-btn" data-v="1"><div class="g-dot" style="color:#f97316;background:#f97316"></div>Threats</button>
    <button class="g-btn" data-v="2"><div class="g-dot" style="color:#a855f7;background:#a855f7"></div>Fire & Hazmat</button>
    <button class="g-btn" data-v="3"><div class="g-dot" style="color:#3b82f6;background:#3b82f6"></div>Infrastructure</button>
    <button class="g-btn" data-v="4"><div class="g-dot" style="color:#22c55e;background:#22c55e"></div>Transport</button>
  </div>

  <div class="glass legend">
    <div class="leg-title">Source Legend</div>
    <div class="leg-row"><div class="leg-dot" style="background:#fff"></div><div class="leg-label">Samdesk</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#38bdf8"></div><div class="leg-label">Dataminr Pulse</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#fb923c"></div><div class="leg-label">DataCapable</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#4ade80"></div><div class="leg-label">IRWIN</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#c084fc"></div><div class="leg-label">Geospark</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#facc15"></div><div class="leg-label">Seerist</div></div>
    <div class="leg-row"><div class="leg-dot" style="background:#f472b6"></div><div class="leg-label">Factal</div></div>
    <div class="leg-note" style="margin-top:6px">Bar length = incident count</div>
  </div>

  <div class="instr" id="instr">Move your cursor to explore the map</div>

  <div class="lens-tt" id="ltt">
    <div class="lens-num" id="lNum">0</div>
    <div class="lens-sub">incidents</div>
    <div class="lens-mi" id="lMi">2 mi radius</div>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Basemap",
      "esri/layers/WebTileLayer"
    ], function(Map, MapView, Basemap, WebTileLayer) {

      // ═══════════════════════════════════════
      // CONFIG
      // ═══════════════════════════════════════
      var M2M = 1609.344;
      var PR_DIM = 1.0, PR_BRI = 2.5;
      var BAR_MAX = 70, BAR_W = 7, RING_GAP = 14;

      var CAT_C = [
        [239,68,68], [249,115,22], [168,85,247], [59,130,246], [34,197,94]
      ];
      var CAT_L = ["Armed Violence","Threats","Fire & Hazmat","Infrastructure","Transport"];

      var SRC_C = [
        [255,255,255], [56,189,248], [251,146,60], [74,222,128],
        [192,132,252], [250,204,21], [244,114,182]
      ];
      var SRC_L = ["Samdesk","Dataminr","DataCapable","IRWIN","Geospark","Seerist","Factal"];

      // ═══════════════════════════════════════
      // MAP — show immediately while data loads
      // ═══════════════════════════════════════
      var darkBasemap = new Basemap({
        baseLayers: [
          new WebTileLayer({
            urlTemplate: "https://{subDomain}.basemaps.cartocdn.com/dark_all/{level}/{col}/{row}.png",
            subDomains: ["a", "b", "c", "d"]
          })
        ]
      });

      var map = new Map({ basemap: darkBasemap });

      var view = new MapView({
        container: "viewDiv", map: map,
        center: [-118.25, 34.05], zoom: 10,
        constraints: { minZoom: 9, maxZoom: 16 },
        navigation: { mouseWheelZoomEnabled: true }
      });

      // ═══════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════
      var aCat = -1, aSrc = -1, rMi = 2;
      var mx = -999, my = -999, mOn = false, aR = 0;
      var N = 0;
      var lonArr, latArr, catArr, srcArr;
      var wmxArr, wmyArr, sxArr, syArr, visArr;
      var dataReady = false;

      function m2px(mi) { return view.resolution ? (mi * M2M) / view.resolution : 140; }

      // ═══════════════════════════════════════
      // CANVAS
      // ═══════════════════════════════════════
      var cv = document.getElementById("lensCanvas");
      var cx = cv.getContext("2d");

      function rz() {
        var d = devicePixelRatio;
        cv.width = innerWidth * d; cv.height = innerHeight * d;
        cv.style.width = innerWidth + "px"; cv.style.height = innerHeight + "px";
        cx.setTransform(d, 0, 0, d, 0, 0);
      }
      addEventListener("resize", rz); rz();

      // ═══════════════════════════════════════
      // PROJECTION
      // ═══════════════════════════════════════
      var DEG2RAD = Math.PI / 180;
      var EARTH_R = 6378137;

      function proj() {
        if (!dataReady) return;
        var ext = view.extent;
        if (!ext) return;
        var W = innerWidth, H = innerHeight;
        var sx = W / (ext.xmax - ext.xmin);
        var sy = H / (ext.ymax - ext.ymin);
        var xmin = ext.xmin, ymax = ext.ymax;

        for (var i = 0; i < N; i++) {
          var px = (wmxArr[i] - xmin) * sx;
          var py = (ymax - wmyArr[i]) * sy;
          sxArr[i] = px;
          syArr[i] = py;
          visArr[i] = (px > -50 && px < W + 50 && py > -50 && py < H + 50) ? 1 : 0;
        }
      }

      // ═══════════════════════════════════════
      // DRAW
      // ═══════════════════════════════════════
      function draw() {
        var W = innerWidth, H = innerHeight;
        cx.clearRect(0, 0, W, H);

        if (!dataReady) { requestAnimationFrame(draw); return; }

        var tR = mOn ? m2px(rMi) : 0;
        aR += (tR - aR) * 0.1;
        var R = aR, lx = mx, ly = my;
        var R2 = R * R;

        if (R > 2) {
          cx.save();
          cx.fillStyle = "rgba(4,6,14,0.62)";
          cx.beginPath(); cx.rect(0, 0, W, H); cx.arc(lx, ly, R, 0, Math.PI * 2, true); cx.fill();
          cx.restore();
        }

        var inCatSrc = new Int32Array(35);
        var totalIn = 0;

        for (var c = 0; c < 5; c++) {
          if (aCat >= 0 && c !== aCat) continue;
          var co = CAT_C[c];
          cx.fillStyle = "rgba(" + co[0] + "," + co[1] + "," + co[2] + ",0.10)";
          cx.beginPath();
          for (var i = 0; i < N; i++) {
            if (!visArr[i] || catArr[i] !== c) continue;
            if (aSrc >= 0 && srcArr[i] !== aSrc) continue;
            var dx = sxArr[i] - lx, dy = syArr[i] - ly;
            if (dx * dx + dy * dy < R2) continue;
            cx.moveTo(sxArr[i] + PR_DIM, syArr[i]);
            cx.arc(sxArr[i], syArr[i], PR_DIM, 0, Math.PI * 2);
          }
          cx.fill();
        }

        for (var c = 0; c < 5; c++) {
          if (aCat >= 0 && c !== aCat) continue;
          var co = CAT_C[c];
          cx.fillStyle = "rgba(" + co[0] + "," + co[1] + "," + co[2] + ",0.92)";
          cx.beginPath();
          for (var i = 0; i < N; i++) {
            if (!visArr[i] || catArr[i] !== c) continue;
            if (aSrc >= 0 && srcArr[i] !== aSrc) continue;
            var dx = sxArr[i] - lx, dy = syArr[i] - ly;
            if (dx * dx + dy * dy >= R2) continue;
            cx.moveTo(sxArr[i] + PR_BRI, syArr[i]);
            cx.arc(sxArr[i], syArr[i], PR_BRI, 0, Math.PI * 2);
            inCatSrc[c * 7 + srcArr[i]]++;
            totalIn++;
          }
          cx.fill();
        }

        if (R > 5) {
          cx.strokeStyle = "rgba(108,140,255,0.28)"; cx.lineWidth = 1.5;
          cx.beginPath(); cx.arc(lx, ly, R, 0, Math.PI * 2); cx.stroke();

          var g = cx.createRadialGradient(lx, ly, Math.max(0, R - 2), lx, ly, R + 8);
          g.addColorStop(0, "rgba(108,140,255,0.08)"); g.addColorStop(1, "rgba(108,140,255,0)");
          cx.fillStyle = g;
          cx.beginPath(); cx.arc(lx, ly, R + 8, 0, Math.PI * 2);
          cx.arc(lx, ly, Math.max(0, R - 2), 0, Math.PI * 2, true); cx.fill();

          radBars(lx, ly, R, inCatSrc);
          tooltip(lx, ly, R, totalIn);
        } else {
          document.getElementById("ltt").classList.remove("vis");
        }

        requestAnimationFrame(draw);
      }

      // ═══════════════════════════════════════
      // RADIAL BARS
      // ═══════════════════════════════════════
      function radBars(px, py, R, cs) {
        var ac = [];
        for (var c = 0; c < 5; c++) {
          if (aCat >= 0 && c !== aCat) continue;
          var tot = 0;
          for (var s = 0; s < 7; s++) tot += cs[c * 7 + s];
          if (tot > 0) ac.push(c);
        }
        if (!ac.length) return;

        var gm = 0;
        for (var i = 0; i < 35; i++) if (cs[i] > gm) gm = cs[i];
        if (!gm) return;

        var ca = Math.PI * 2 / ac.length;
        var cp = 0.08;
        var bs = R + RING_GAP;

        var asSrcs = [];
        for (var s = 0; s < 7; s++) {
          if (aSrc >= 0 && s !== aSrc) continue;
          var has = false;
          for (var c2 = 0; c2 < 5; c2++) if (cs[c2 * 7 + s] > 0) { has = true; break; }
          if (has) asSrcs.push(s);
        }
        var nS = asSrcs.length;
        if (!nS) return;

        for (var ci = 0; ci < ac.length; ci++) {
          var ck = ac[ci];
          var cc = CAT_C[ck];
          var ss = -Math.PI / 2 + ci * ca + cp / 2;
          var se = ss + ca - cp;
          var sm = (ss + se) / 2;

          for (var sii = 0; sii < asSrcs.length; sii++) {
            var si = asSrcs[sii];
            var cnt = cs[ck * 7 + si];
            if (!cnt) continue;
            var bl = (cnt / gm) * BAR_MAX;
            var sc = SRC_C[si];
            var ao = ((sii - (nS - 1) / 2) / Math.max(nS, 1)) * (ca - cp) * 0.6;
            var ba = sm + ao;

            var x1 = px + Math.cos(ba) * bs, y1 = py + Math.sin(ba) * bs;
            var x2 = px + Math.cos(ba) * (bs + bl), y2 = py + Math.sin(ba) * (bs + bl);

            var r = Math.round(cc[0] * 0.4 + sc[0] * 0.6);
            var g2 = Math.round(cc[1] * 0.4 + sc[1] * 0.6);
            var b = Math.round(cc[2] * 0.4 + sc[2] * 0.6);
            var a = 0.5 + (sii / Math.max(nS, 1)) * 0.4;

            cx.strokeStyle = "rgba(" + r + "," + g2 + "," + b + "," + a + ")";
            cx.lineWidth = BAR_W; cx.lineCap = "round";
            cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();

            if (bl > 20) {
              var lr = bs + bl + 10;
              cx.font = "600 9px Inter,system-ui";
              cx.fillStyle = "rgba(" + r + "," + g2 + "," + b + ",0.8)";
              cx.textAlign = "center"; cx.textBaseline = "middle";
              cx.fillText(cnt, px + Math.cos(ba) * lr, py + Math.sin(ba) * lr);
            }
          }

          var lr2 = bs + BAR_MAX + 24;
          cx.font = "700 10px Inter,system-ui";
          cx.fillStyle = "rgba(" + cc[0] + "," + cc[1] + "," + cc[2] + ",0.85)";
          cx.textAlign = "center"; cx.textBaseline = "middle";
          cx.fillText(CAT_L[ck], px + Math.cos(sm) * lr2, py + Math.sin(sm) * lr2);

          var ct = 0;
          for (var s2 = 0; s2 < 7; s2++) ct += cs[ck * 7 + s2];
          cx.font = "500 9px Inter,system-ui"; cx.fillStyle = "rgba(255,255,255,0.30)";
          cx.fillText(ct, px + Math.cos(sm) * (lr2 + 14), py + Math.sin(sm) * (lr2 + 14));

          if (ci < ac.length - 1) {
            var sa = se + cp / 2;
            cx.strokeStyle = "rgba(255,255,255,0.05)"; cx.lineWidth = 1;
            cx.beginPath();
            cx.moveTo(px + Math.cos(sa) * (bs - 4), py + Math.sin(sa) * (bs - 4));
            cx.lineTo(px + Math.cos(sa) * (bs + BAR_MAX + 5), py + Math.sin(sa) * (bs + BAR_MAX + 5));
            cx.stroke();
          }
        }

        if (aSrc < 0 && nS > 1) {
          var ly2 = py + R * 0.45;
          var rows = nS > 4 ? 2 : 1;
          var perRow = Math.ceil(nS / rows);
          for (var row = 0; row < rows; row++) {
            var count = Math.min(perRow, nS - row * perRow);
            var rx = px - (count * 55) / 2;
            for (var j = row * perRow; j < row * perRow + count; j++) {
              var si2 = asSrcs[j];
              var sc2 = SRC_C[si2];
              cx.fillStyle = "rgba(" + sc2[0] + "," + sc2[1] + "," + sc2[2] + ",0.7)";
              cx.beginPath(); cx.roundRect(rx, ly2 + row * 14, 8, 4, 2); cx.fill();
              cx.font = "500 8px Inter,system-ui"; cx.fillStyle = "rgba(255,255,255,0.35)";
              cx.textAlign = "left"; cx.textBaseline = "middle";
              cx.fillText(SRC_L[si2].substring(0, 6), rx + 11, ly2 + 2 + row * 14);
              rx += 55;
            }
          }
        }
      }

      function tooltip(px, py, R, n) {
        var t = document.getElementById("ltt");
        var e = document.getElementById("lNum");
        var m = document.getElementById("lMi");
        if (R > 10) {
          t.classList.add("vis");
          t.style.left = (px - 50) + "px";
          t.style.top = (py - R * 0.35) + "px";
          t.style.width = "100px";
          e.textContent = n.toLocaleString();
          m.textContent = rMi + " mi radius";
        } else {
          t.classList.remove("vis");
        }
      }

      // ═══════════════════════════════════════
      // INTERACTION
      // ═══════════════════════════════════════
      var il = document.getElementById("interactionLayer");

      il.addEventListener("mousemove", function(e) {
        mx = e.clientX; my = e.clientY; mOn = true;
        document.getElementById("instr").classList.add("off");
      });
      il.addEventListener("mouseleave", function() { mOn = false; });

      il.addEventListener("wheel", function(e) {
        document.getElementById("viewDiv").dispatchEvent(new WheelEvent("wheel", {
          clientX: e.clientX, clientY: e.clientY,
          deltaX: e.deltaX, deltaY: e.deltaY, deltaMode: e.deltaMode,
          bubbles: true, cancelable: true
        }));
      });

      var drag = false;
      il.addEventListener("mousedown", function() { drag = true; il.style.pointerEvents = "none"; });
      document.addEventListener("mouseup", function() { if (drag) { drag = false; il.style.pointerEvents = "auto"; } });
      document.addEventListener("mousemove", function(e) { if (drag) { mx = e.clientX; my = e.clientY; } });

      // ═══════════════════════════════════════
      // BUTTON GROUPS
      // ═══════════════════════════════════════
      function grp(id, cb) {
        var c = document.getElementById(id);
        c.querySelectorAll(".g-btn").forEach(function(b) {
          b.addEventListener("click", function() {
            c.querySelectorAll(".g-btn").forEach(function(x) { x.classList.remove("on"); });
            b.classList.add("on"); cb(b.dataset.v);
          });
        });
      }

      grp("catBar", function(v) { aCat = parseInt(v); });
      grp("srcBar", function(v) { aSrc = parseInt(v); });
      grp("radBar", function(v) { rMi = parseInt(v); });

      // ═══════════════════════════════════════
      // INIT — map shows first, data loads in parallel
      // ═══════════════════════════════════════
      view.when(function() {
        view.ui.components = [];

        // Map is visible now — start render loop immediately
        requestAnimationFrame(draw);
        document.getElementById("loadMsg").textContent = "Loading incidents...";

        // Data was already fetching since page load (window._dp)
        window._dp.then(function(buf) {
          var dv = new DataView(buf);
          N = dv.getUint32(0, true);

          var lonOff = 4;
          var latOff = lonOff + N * 4;
          var catOff = latOff + N * 4;
          var srcOff = catOff + N;

          lonArr = new Float32Array(buf, lonOff, N);
          latArr = new Float32Array(buf, latOff, N);
          catArr = new Uint8Array(buf, catOff, N);
          srcArr = new Uint8Array(buf, srcOff, N);

          // Pre-compute Web Mercator coordinates
          wmxArr = new Float32Array(N);
          wmyArr = new Float32Array(N);
          for (var i = 0; i < N; i++) {
            wmxArr[i] = lonArr[i] * EARTH_R * DEG2RAD;
            var latRad = latArr[i] * DEG2RAD;
            wmyArr[i] = EARTH_R * Math.log(Math.tan(Math.PI / 4 + latRad / 2));
          }

          sxArr = new Float32Array(N);
          syArr = new Float32Array(N);
          visArr = new Uint8Array(N);

          dataReady = true;
          proj();

          view.watch("extent", function() { proj(); });
          view.watch("zoom", function() { proj(); });

          document.getElementById("loader").classList.add("off");
        });
      }, function(err) {
        console.error("View init error:", err);
        document.getElementById("loadMsg").textContent = "Error loading map.";
      });

    });
  </script>
</body>
</html>
